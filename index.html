<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Optimisation pour mobiles et tablettes : empêche le zoom automatique -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGO Net 🐢</title>

    <!-- Importation de la police Google Fonts "Quicksand" (Ludique et ronde) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <!-- Lien vers votre fichier de styles CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- =========================================
         🔑 ÉCRAN DE CONNEXION (SÉCURISÉ ET LUDIQUE)
         ========================================= -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔑 Connexion LOGO</h2>
            <p>Entre tes informations pour commencer l'aventure !</p>
            
            <!-- Champ 1 : Code Massar -->
            <input type="text" id="massar-in" placeholder="Code Massar (Ex: G123456789)" autocomplete="off">
            
            <!-- Champ 2 : Date de naissance (Obligatoire) -->
            <input type="date" id="date-in" title="Ta date de naissance">
            
            <!-- Le bouton déclenche la fonction authentifier() du JS -->
            <button onclick="authentifier()">C'est parti !</button>
        </div>
    </div>

    <!-- =========================================
         🐢 APPLICATION PRINCIPALE (JEU)
         ========================================= -->
    <!-- Masquée par défaut (display:none), affichée par JS après connexion réussie -->
    <div id="game-app" class="app-container" style="display:none;">
        
        <!-- ZONE DE LA GRILLE (À gauche sur PC, Haut sur Mobile) -->
        <main class="grid-area">
            <div id="grid-container" class="letter-grid">
                <!-- La grille 15x15 sera générée ici par le JavaScript -->
            </div>
        </main>
        
        <!-- ZONE DE L'ATELIER (À droite sur PC, Bas sur Mobile) -->
        <aside class="workshop-area">
            <h3>Atelier des Primitives</h3>
            <p class="hint">Devine le mot caché, puis trouve-le dans la grille.</p>
            
            <div id="anagram-container">
                <!-- Les anagrammes et inputs seront générés ici par le JavaScript -->
            </div>
        </aside>
    </div>

    <!-- =========================================
         🎓 MODALE DE BILAN FINAL
         ========================================= -->
    <!-- Masquée par défaut, affichée par JS à la fin du jeu -->
    <div id="feedback-overlay" class="modal-overlay" style="display:none;">
        <div class="feedback-box">
            <h3>🎓 Bilan de compétences</h3>
            <p>Félicitations, tu as trouvé toutes les primitives !<br>
            Qu'as-tu appris aujourd'hui en Programmation LOGO ?</p>
            
            <textarea id="user-feedback" rows="5" placeholder="Décris tes nouvelles compétences..."></textarea>
            
            <button id="submit-btn" onclick="envoyerDonnees()">Envoyer mon bilan au professeur</button>
            <p id="status-msg"></p>
        </div>
    </div>

    <!-- Lien vers votre fichier de logique JavaScript -->
    <script src="script.js"></script>
</body>
</html>
