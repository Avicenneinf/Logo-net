<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGO Junior - Version Tactile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Écran de connexion -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔑 Connexion LOGO</h2>
            <input type="text" id="massar-in" placeholder="Code Massar">
            <input type="date" id="date-in">
            <button onclick="authentifier()">Démarrer</button>
        </div>
    </div>

    <!-- Application principale -->
    <div id="game-app" class="app-container" style="display:none;">
        <main class="grid-area">
            <div id="grid-container" class="letter-grid"></div>
        </main>
        
        <aside class="workshop-area">
            <h3>Atelier des Primitives</h3>
            <div id="anagram-container"></div>
        </aside>
    </div>

    <!-- Bilan final libre -->
    <div id="feedback-overlay" class="modal-overlay" style="display:none;">
        <div class="feedback-box">
            <h3>🎓 Bilan de compétences</h3>
            <p>Quelles compétences as-tu développées en Programmation LOGO ?</p>
            <textarea id="user-feedback" rows="5" placeholder="Décris ce que tu as appris..."></textarea>
            <button id="submit-btn" onclick="envoyerDonnees()">Envoyer au professeur</button>
            <p id="status-msg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
