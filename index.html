<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGO Junior - Mission Expert</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Écran de connexion -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔑 Connexion LOGO</h2>
            <input type="text" id="massar-in" placeholder="Code Massar">
            <input type="date" id="date-in">
            <button onclick="authentifier()">Démarrer la mission</button>
        </div>
    </div>

    <!-- Application principale -->
    <div id="game-app" class="app-container" style="display:none;">
        <main class="grid-area">
            <div id="grid-container" class="letter-grid"></div>
        </main>
        
        <aside class="workshop-area">
            <h2>Atelier des Primitives</h2>
            <p class="instr">Répare le mot à droite, puis trouve-le dans la grille.</p>
            <div id="anagram-container"></div>
        </aside>
    </div>

    <!-- Fenêtre de bilan final -->
    <div id="feedback-overlay" class="modal-overlay" style="display:none;">
        <div class="feedback-box">
            <h3>🎓 Bilan de la séquence  « Programmation LOGO » </h3>
            <div class="feedback-question">
                <p><strong>Quelles sont les compétences que tu as développées dans la séquence « Programmation LOGO » ?</strong></p>
                <textarea id="user-feedback" rows="6" placeholder="Partage ici ce que tu as appris ou compris..."></textarea>
            </div>
            <button id="submit-btn" onclick="envoyerDonnees()">Transmettre au professeur</button>
            <p id="status-msg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
